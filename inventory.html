<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Collection — The Last Kick</title>
  <style>
    /* ── FONTS ── */
    @font-face {
      font-family: 'GillSans';
      src: url('assets/fonts/Gill Sans.otf') format('opentype'),
           url('assets/fonts/Gill Sans MT.ttf') format('truetype');
      font-weight: 400;
      font-style: normal;
    }
    @font-face {
      font-family: 'GillSans';
      src: url('assets/fonts/Gill Sans Bold.otf') format('opentype');
      font-weight: 700;
      font-style: normal;
    }
    @font-face {
      font-family: 'GillSans';
      src: url('assets/fonts/Gill Sans Heavy.otf') format('opentype');
      font-weight: 800;
      font-style: normal;
    }
    @font-face {
      font-family: 'GillSans';
      src: url('assets/fonts/Gill Sans Bold Italic.otf') format('opentype');
      font-weight: 700;
      font-style: italic;
    }
    @font-face {
      font-family: 'Maxime';
      src: url('assets/fonts/Maxime W01 Bd SC/Web Fonts/f997711963438aad23e3a7930b4bc50b.woff2') format('woff2'),
           url('assets/fonts/Maxime W01 Bd SC/Web Fonts/f997711963438aad23e3a7930b4bc50b.woff') format('woff'),
           url('assets/fonts/Maxime W01 Bd SC/Web Fonts/f997711963438aad23e3a7930b4bc50b.ttf') format('truetype');
      font-weight: normal;
      font-style: normal;
      font-display: swap;
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #0b1220;
      --panel: #0f172a;
      --muted: #94a3b8;
      --text: #e5e7eb;
      --accent: #22c55e;
      --accent2: #38bdf8;
      --line: #1f2937;
      --gold: #c8963c;
      --gold-light: #e8b458;
      --danger: #f87171;
      --border: rgba(255,255,255,0.08);
      --border-blue: rgba(55,138,221,0.35);
    }

    html, body { height: 100%; }
    body {
      margin: 0;
      background: var(--bg);
      color: var(--text);
      font-family: 'GillSans', 'Gill Sans', 'Gill Sans MT', system-ui, -apple-system, sans-serif;
      min-height: 100vh;
      font-size: 16px;
    }
    .nav-logo, h1, h2, h3 { font-family: 'Maxime', serif; }

    /* ── NAV ── */
    nav {
      background: var(--panel);
      border-bottom: 1px solid var(--border);
      padding: 0 24px;
      display: flex;
      align-items: center;
      height: 52px;
      position: sticky;
      top: 0;
      z-index: 100;
    }
    .nav-logo { font-size: 18px; font-weight: 700; color: var(--gold); letter-spacing: 0.1em; margin-right: 28px; text-decoration: none; }
    .nav-links { display: flex; flex: 1; }
    .nav-link { padding: 0 14px; height: 52px; display: flex; align-items: center; color: var(--muted); text-decoration: none; font-size: 13px; border-bottom: 2px solid transparent; transition: color 0.2s; white-space: nowrap; }
    .nav-link:hover { color: var(--text); }
    .nav-link.active { color: var(--text); border-bottom-color: #378ADD; }
    .nav-right { display: flex; align-items: center; gap: 16px; margin-left: auto; }
    .nav-balance { font-size: 12px; color: var(--muted); display: flex; gap: 12px; }
    .nav-balance .val { color: #EF9F27; font-weight: 600; }
    .nav-user { display: flex; align-items: center; gap: 8px; cursor: pointer; position: relative; }
    .nav-avatar { width: 28px; height: 28px; border-radius: 50%; background: #1a3a6e; display: flex; align-items: center; justify-content: center; font-size: 11px; font-weight: 600; color: #7eb4f5; flex-shrink: 0; overflow: hidden; }
    .nav-avatar img { width: 100%; height: 100%; object-fit: cover; border-radius: 50%; }
    .nav-username { font-size: 13px; color: rgba(255,255,255,0.7); }
    .nav-dropdown { display: none; position: absolute; top: calc(100% + 8px); right: 0; background: var(--panel); border: 1px solid var(--border); border-radius: 10px; min-width: 160px; padding: 6px; z-index: 200; }
    .nav-user.open .nav-dropdown { display: block; }
    .nav-dropdown-item { padding: 9px 12px; font-size: 13px; color: var(--muted); border-radius: 6px; cursor: pointer; transition: background 0.15s, color 0.15s; }
    .nav-dropdown-item:hover { background: rgba(255,255,255,0.05); color: var(--text); }
    .nav-dropdown-item.danger { color: var(--danger); }
    .nav-dropdown-item.danger:hover { background: rgba(248,113,113,0.08); }

    /* ── LAYOUT ── */
    .wrap { max-width: 1200px; margin: 0 auto; padding: 24px 20px; }
    .panel { background: var(--panel); border: 1px solid var(--line); border-radius: 16px; box-shadow: 0 10px 30px rgba(0,0,0,.2); }
    .hdr { display: flex; gap: 16px; align-items: center; justify-content: space-between; padding: 14px 16px; border-bottom: 1px solid var(--line); }
    .hdr h1 { font-size: 18px; margin: 0; font-weight: 700; }
    .muted { color: var(--muted); font-size: 12px; }

    /* ── FILTERS / TOOLBAR ── */
    .toolbar { display: flex; flex-wrap: wrap; align-items: center; gap: 10px 12px; padding: 12px 16px; border-bottom: 1px solid var(--line); }
    .pill {
      display: flex; align-items: center; gap: 8px;
      padding: 6px 10px;
      border: 1px solid rgba(255,255,255,0.12);
      border-radius: 9999px;
      background: #0b1220;
      white-space: nowrap;
      font-size: 13px;
      color: var(--muted);
    }
    .pill select, .pill input[type="text"] {
      appearance: none;
      background: #0f172a;
      color: #fff;
      border: 0;
      outline: 0;
      height: 32px;
      line-height: 32px;
      padding: 0 10px;
      min-width: 120px;
      border-radius: 8px;
      font-family: inherit;
      font-size: 13px;
    }
    .pill select option, .pill select optgroup { background: #0b1220; color: #fff; }
    .pill select:focus, .pill input[type="text"]:focus { outline: 2px solid #3b82f6; outline-offset: 2px; }
    .pill-checkbox { padding-right: 12px; }
    .pill-checkbox input[type="checkbox"] { width: 16px; height: 16px; }

    /* Admin-only user lookup */
    #adminSearch { display: none; align-items: center; gap: 8px; }
    #adminSearch input { background: #0f172a; border: 1px solid #263042; color: #fff; border-radius: 8px; padding: 6px 10px; font-size: 12px; font-family: inherit; width: 200px; }

    /* ── BUTTONS ── */
    .btn { background: #2563eb; border: 0; color: #fff; border-radius: 10px; padding: 0 14px; height: 34px; line-height: 34px; font-weight: 600; cursor: pointer; font-family: inherit; font-size: 13px; }
    .btn.alt { background: #334155; }

    /* ── CARD GRID ── */
    .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(160px, 1fr)); gap: 12px; padding: 16px; }
    .card { background: #0b1220; border: 1px solid var(--line); border-radius: 14px; overflow: hidden; }
    .thumb { aspect-ratio: 3/4; background: #060a12; display: block; width: 100%; object-fit: cover; }
    .meta { padding: 10px; }
    .meta .name { font-size: 14px; font-weight: 700; }
    .meta .sub { font-size: 12px; color: var(--muted); margin-top: 2px; }

    /* ── FOOTER ── */
    .footer { display: flex; justify-content: space-between; align-items: center; padding: 12px 16px; border-top: 1px solid var(--line); flex-wrap: wrap; gap: 10px; }
    .page { display: flex; gap: 8px; align-items: center; }
    .page input { width: 56px; text-align: center; background: #0b1220; border: 1px solid #263042; color: var(--text); border-radius: 8px; padding: 6px; font-family: inherit; font-size: 13px; }
    .page select { background: #0b1220; border: 1px solid #263042; color: var(--text); border-radius: 8px; padding: 6px; font-family: inherit; font-size: 13px; }

    /* ── EMPTY STATE ── */
    .empty-state { padding: 48px; text-align: center; color: var(--muted); font-size: 14px; }

    /* ── RESPONSIVE ── */
    @media (max-width: 640px) {
      nav { padding: 0 14px; }
      .nav-balance { display: none; }
      .nav-link { padding: 0 10px; font-size: 12px; }
    }
  </style>
</head>
<body>

<nav>

  <div class="nav-links">

<!-- ── MAIN ── -->
<div class="wrap">
  <div class="panel">
    <div class="hdr">

      <!-- Admin: view any player's collection by ID -->
      <div id="adminSearch">
        <input id="userId" placeholder="View player Discord ID…" />
        <button class="btn" id="btnSearch">View</button>
      </div>
    </div>

    <!-- Filters -->
    <div class="toolbar" id="filters">
      <label class="pill">
        <select id="rarity">
          <option value="ALL">Rarity: ALL</option>
          <option>N</option><option>R</option><option>AR</option><option>SR</option><option>IR</option><option>SSR</option>
        </select>
      </label>
      <label class="pill">
        <select id="position">
          <option value="ALL">Position: ALL</option>
          <option>GK</option><option>RB</option><option>LB</option><option>CB</option>
          <option>DM</option><option>CM</option><option>AM</option>
          <option>RW</option><option>LW</option><option>ST</option>
        </select>
      </label>
      <label class="pill">
        <select id="batch">
          <option value="ALL">Batch: ALL</option>
          <option value="Base">Base</option>
          <option value="Base U">Base U</option>

      </label>
      <label class="pill">
        <select id="club">
          <option value="ALL">Club: ALL</option>
        </select>
      </label>
      <label class="pill">
        <select id="sortBy">
          <option value="rarity_club" selected>Sort: Rarity</option>
          <option value="club">Club</option>

          <option value="name">Name (A→Z)</option>

<script>
// ── CONFIG ────────────────────────────────────────────────────────────────
const API_BASE = 'https://the-last-kick.keithcheung129.workers.dev/api';
const WORKER   = 'https://the-last-kick.keithcheung129.workers.dev';

// ── AUTH STATE ────────────────────────────────────────────────────────────
let sessionToken = localStorage.getItem('tlk_session') || '';
let currentUser  = null;

// ── HELPERS ───────────────────────────────────────────────────────────────
const $ = (id) => document.getElementById(String(id).replace(/^#/, ''));
const val = (id, fallback = '') => ($(''+id)?.value ?? fallback);
const chk = (id) => !!$(''+id)?.checked;
const byId = (id) => { const el = document.getElementById(id); if (!el) console.warn(`Missing #${id}`); return el; };

// ── SORT HELPERS ──────────────────────────────────────────────────────────
const RARITY_ORDER   = ['GOD','SSR','IR','SR','AR','R','N','U','ALL'];
const POSITION_ORDER = ['GK','CB','RB','LB','DM','CM','AM','LW','RW','ST','MGR','STM','EVE','ALL'];
const U = (s) => String(s ?? '').toUpperCase();
const rank = (v, order) => { const i = order.indexOf(U(v)); return i === -1 ? 999 : i; };

function sortItems(items, mode) {
  items.sort((a, b) => {
    const ra = rank(a.rarity, RARITY_ORDER),   rb = rank(b.rarity, RARITY_ORDER);
    const pa = rank(a.position, POSITION_ORDER), pb = rank(b.position, POSITION_ORDER);
    const ca = U(a.club), cb = U(b.club);
    const ba = U(a.batch), bb = U(b.batch);
    const na = (a.name || a.player || a.printcode || a.card_id || '').toString();
    const nb = (b.name || b.player || b.printcode || b.card_id || '').toString();
    const ta = Number(a.acquired_ts || a.acquiredAt || a.ts || 0);
    const tb = Number(b.acquired_ts || b.acquiredAt || b.ts || 0);
    switch (mode) {
      case 'rarity_asc':  return rb - ra || ca.localeCompare(cb) || pa - pb || na.localeCompare(nb);
      case 'club':        return ca.localeCompare(cb) || pa - pb || ra - rb || na.localeCompare(nb);
      case 'position':    return pa - pb || ra - rb || ca.localeCompare(cb) || na.localeCompare(nb);
      case 'batch':       return ba.localeCompare(bb) || ra - rb || ca.localeCompare(cb) || na.localeCompare(nb);
      case 'name':        return na.localeCompare(nb);
      case 'newest':      return tb - ta || ra - rb || ca.localeCompare(cb) || na.localeCompare(nb);
      case 'oldest':      return ta - tb || ra - rb || ca.localeCompare(cb) || na.localeCompare(nb);
      default:            return ra - rb || ca.localeCompare(cb) || pa - pb || na.localeCompare(nb);
    }
  });
  return items;
}

// ── API ───────────────────────────────────────────────────────────────────
async function callCollection(params) {
  const res = await fetch(API_BASE, {
    method: 'POST',
    headers: {
      'Content-Type': 'application/json',
      'X-Session-Token': sessionToken,
    },
    body: JSON.stringify({ action: 'collection', ...params }),
  });
  const text = await res.text();
  if (!res.ok) throw new Error(`API ${res.status}: ${text.slice(0, 500)}`);
  let body;
  try { body = JSON.parse(text); } catch { throw new Error('Bad JSON from API'); }
  return (body && typeof body === 'object' && 'ok' in body && 'data' in body) ? body.data : body;
}

// ── RENDER ────────────────────────────────────────────────────────────────
function render(items) {
  const root = $('dex');
  root.innerHTML = '';
  for (const it of items) {
    const div = document.createElement('div');
    div.className = 'card';
    const img = document.createElement('img');
    img.className = 'thumb';
    img.loading = 'lazy';
    img.src = it.image_url || it.image_ref || '';
    img.alt = it.name || it.printcode || it.card_id || '';
    div.appendChild(img);
    const meta = document.createElement('div');
    meta.className = 'meta';
    const nm = document.createElement('div');
    nm.className = 'name';
    nm.textContent = it.name || it.player || it.printcode || it.card_id || '—';
    const sb = document.createElement('div');
    sb.className = 'sub';
    const bits = [it.rarity, it.club, it.position, it.batch, it.serial ? ('#' + it.serial) : null].filter(Boolean);
    sb.textContent = bits.join(' • ');
    meta.appendChild(nm);
    meta.appendChild(sb);
    div.appendChild(meta);
    root.appendChild(div);
  }
}

function populateClubs(items) {
  const sel = byId('club');
  if (!sel) return;
  const cur = sel.value || 'ALL';
  const clubs = Array.from(new Set(items.map(it => (it.club || '').trim()).filter(Boolean))).sort((a, b) => a.localeCompare(b));
  sel.innerHTML = '<option value="ALL">Club: ALL</option>' + clubs.map(c => `<option>${c}</option>`).join('');
  if (Array.from(sel.options).some(o => o.value === cur)) sel.value = cur;
}

function updateCounts(total, page, pageSize) {
  const pages = Math.max(1, Math.ceil(total / pageSize));
  $('countInfo').textContent = `${total} card${total === 1 ? '' : 's'}`;
  $('pages').textContent = pages;
  $('page').value = Math.min(page, pages);
  $('prevBtn').disabled = (page <= 1);
  $('nextBtn').disabled = (page >= pages);
}

function updateNavBalance(data) {
  const t   = data?.ticket_balance ?? data?.tickets ?? data?.balances?.tickets ?? null;
  const tok = data?.token_balance  ?? data?.tokens  ?? data?.balances?.tokens  ?? null;
  if (t !== null) {
    $('navTickets').textContent = t;
    $('navTokens').textContent  = tok ?? '—';
    $('navBalance').style.display = 'flex';
  }
}

// ── SEARCH ────────────────────────────────────────────────────────────────
function buildQuery() {
  const adminId = val('userId', '').trim();
  const q = {
    page:        Math.max(1, parseInt(val('page', '1')) || 1),
    page_size:   Math.max(1, parseInt(val('pageSize', '48')) || 48),
    unique_only: chk('uniqueOnly'),
    rarity:      val('rarity', 'ALL') || 'ALL',
    position:    val('position', 'ALL') || 'ALL',
    batch:       val('batch', 'ALL') || 'ALL',
    club:        val('club', 'ALL') || 'ALL',
  };
  // Admin can pass an explicit user_id to view another player's collection
  if (adminId) q.user_id = adminId;
  return q;
}

async function search() {
  const root = $('dex');
  root.innerHTML = '<div class="empty-state" style="grid-column:1/-1;color:var(--muted)">Loading…</div>';
  try {
    const q = buildQuery();
    const data = await callCollection(q);
    const items = (data.items || []).map(it => ({ ...it, printcode: it.printcode ?? it.card_id }));
    const total = Number(data.total ?? items.length);
    const page  = parseInt(val('page', '1')) || 1;
    const pageSize = parseInt(val('pageSize', '48')) || 48;
    const sortMode = $('sortBy').value || 'rarity_club';
    sortItems(items, sortMode);
    populateClubs(items);
    render(items);
    updateCounts(total, page, pageSize);
    updateNavBalance(data);
    $('countInfo').textContent = `${items.length} shown • ${total} total`;
    if (!items.length) {
      root.innerHTML = '<div class="empty-state" style="grid-column:1/-1">No cards match your filters.</div>';
    }
  } catch (err) {
    console.error(err);
    root.innerHTML = `<div class="empty-state" style="grid-column:1/-1;color:#f87171">Failed to load collection: ${err.message}</div>`;
  }
}

// ── AUTH FUNCTIONS ────────────────────────────────────────────────────────
function showLoginModal() {
  const m = $('loginModal');
  if (m) m.style.display = 'flex';
}

async function loadUserProfile() {
  try {
    const res = await fetch(WORKER + '/auth/me', { headers: { 'X-Session-Token': sessionToken } });
    const json = await res.json();
    if (json.ok && json.user) currentUser = json.user;
  } catch {}
}

function updateNav() {
  if (!currentUser) return;
  const avatarEl = $('navAvatar');
  if (currentUser.avatar) {
    avatarEl.innerHTML = `<img src="${currentUser.avatar}" alt="">`;
  } else {
    avatarEl.textContent = (currentUser.global_name || currentUser.username || '?').slice(0, 2).toUpperCase();
  }
  $('navUsername').textContent = currentUser.global_name || currentUser.username;
  if (currentUser.is_admin) {
    $('adminLink').style.display = 'block';
    $('adminSearch').style.display = 'flex'; // show the "View player" input for admins
  }
  $('loginModal').style.display = 'none';
}

function toggleUserMenu() {
  if (!currentUser) { showLoginModal(); return; }
  $('navUser').classList.toggle('open');
}

document.addEventListener('click', (e) => {
  const navUser = $('navUser');
  if (navUser && !navUser.contains(e.target)) navUser.classList.remove('open');
});

async function doLogout() {
  try {
    await fetch(WORKER + '/auth/logout', { method: 'POST', headers: { 'X-Session-Token': sessionToken } });
  } catch {}
  sessionToken = '';
  currentUser  = null;
  localStorage.removeItem('tlk_session');
  window.location.reload();
}

// Page-specific init after auth
function onAuthReady() {
  // Pre-fill from ?u= (admin lookup via URL)
  const qs = new URLSearchParams(location.search);
  const uParam = qs.get('u');
  if (uParam) {
    const input = $('userId');
    if (input) input.value = uParam;
    // Show subtitle indicating we're viewing someone else
    $('subtitle').textContent = `(viewing: ${uParam})`;
  }
  // Auto-search
  search();
}

// ── INIT ──────────────────────────────────────────────────────────────────
(async function init() {
  // Capture session from OAuth redirect
  const urlParams = new URLSearchParams(window.location.search);
  const urlSession = urlParams.get('session');
  const authStatus = urlParams.get('auth');
  if (urlSession) {
    sessionToken = urlSession;
    localStorage.setItem('tlk_session', sessionToken);
    // Remove session param from URL but keep ?u= if present
    const next = urlParams.get('u') ? `?u=${urlParams.get('u')}` : '';
    window.history.replaceState({}, '', window.location.pathname + next);
  } else if (authStatus) {
    window.history.replaceState({}, '', window.location.pathname);
  }

  if (sessionToken) await loadUserProfile();

  if (!currentUser) {
    showLoginModal();
  } else {
    updateNav();
    onAuthReady();
  }

  // Wire up filter controls
  document.addEventListener('DOMContentLoaded', () => {});

  const safeOn = (id, evt, fn) => {
    const el = document.getElementById(id);
    if (!el) { console.warn(`Missing #${id}`); return; }
    el.addEventListener(evt, fn);
  };

  safeOn('btnSearch', 'click', () => { $('page').value = 1; search(); });
  safeOn('btnReset',  'click', () => { location.href = location.pathname; });
  safeOn('prevBtn',   'click', () => { $('page').value = Math.max(1, parseInt(val('page', '1')) - 1); search(); });
  safeOn('nextBtn',   'click', () => { $('page').value = parseInt(val('page', '1')) + 1; search(); });
  safeOn('club',      'change', () => { $('page').value = 1; search(); });
  safeOn('sortBy',    'change', () => { search(); });
  safeOn('pageSize',  'change', () => { $('page').value = 1; search(); });
  safeOn('rarity',    'change', () => { $('page').value = 1; search(); });
  safeOn('position',  'change', () => { $('page').value = 1; search(); });
  safeOn('batch',     'change', () => { $('page').value = 1; search(); });
  safeOn('uniqueOnly','change', () => { $('page').value = 1; search(); });
})();
</script>
</body>
</html>
