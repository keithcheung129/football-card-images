<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Collection — The Last Kick</title>
  <style>
    /* ── FONTS ── */
    @font-face {
      font-family: 'GillSans';
      src: url('assets/fonts/Gill Sans.otf') format('opentype'),
           url('assets/fonts/Gill Sans MT.ttf') format('truetype');
      font-weight: 400; font-style: normal;
    }
    @font-face {
      font-family: 'GillSans';
      src: url('assets/fonts/Gill Sans Bold.otf') format('opentype');
      font-weight: 700; font-style: normal;
    }
    @font-face {
      font-family: 'GillSans';
      src: url('assets/fonts/Gill Sans Heavy.otf') format('opentype');
      font-weight: 800; font-style: normal;
    }
    @font-face {
      font-family: 'GillSans';
      src: url('assets/fonts/Gill Sans Bold Italic.otf') format('opentype');
      font-weight: 700; font-style: italic;
    }
    @font-face {
      font-family: 'Maxime';
      src: url('assets/font/Maxime W01 Bd SC.ttf') format('truetype');
      font-weight: normal; font-style: normal; font-display: swap;
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #0b1220;
      --panel: #0f172a;
      --muted: #94a3b8;
      --text: #e5e7eb;
      --accent: #22c55e;
      --accent2: #38bdf8;
      --line: #1f2937;
      --gold: #c8963c;
      --danger: #f87171;
      --border: rgba(255,255,255,0.08);
      --border-blue: rgba(55,138,221,0.35);
    }

    html, body { height: 100%; }
    body {
      margin: 0;
      background: var(--bg);
      color: var(--text);
      font-family: 'GillSans', 'Gill Sans', 'Gill Sans MT', system-ui, -apple-system, sans-serif;
      min-height: 100vh;
      font-size: 16px;
    }
    .nav-logo, h1, h2, h3 { font-family: 'Maxime', serif; }

    /* ── NAV ── */
    nav {
      background: var(--panel);
      border-bottom: 1px solid var(--border);
      padding: 0 24px;
      display: flex; align-items: center;
      height: 52px;
      position: sticky; top: 0; z-index: 100;
    }
    .nav-logo { font-size: 18px; font-weight: 700; color: var(--gold); letter-spacing: 0.1em; margin-right: 28px; text-decoration: none; display:flex; align-items:center; gap:8px; }
    .nav-logo img { height: 28px; width: auto; }
    .nav-links { display: flex; flex: 1; }
    .nav-link { padding: 0 14px; height: 52px; display: flex; align-items: center; color: var(--muted); text-decoration: none; font-size: 13px; border-bottom: 2px solid transparent; transition: color 0.2s; white-space: nowrap; }
    .nav-link:hover { color: var(--text); }
    .nav-link.active { color: var(--text); border-bottom-color: #378ADD; }
    .nav-right { display: flex; align-items: center; gap: 16px; margin-left: auto; }
    .nav-balance { font-size: 12px; color: var(--muted); display: flex; gap: 12px; }
    .nav-balance .val { color: #EF9F27; font-weight: 600; }
    .nav-user { display: flex; align-items: center; gap: 8px; cursor: pointer; position: relative; }
    .nav-avatar { width: 28px; height: 28px; border-radius: 50%; background: #1a3a6e; display: flex; align-items: center; justify-content: center; font-size: 11px; font-weight: 600; color: #7eb4f5; flex-shrink: 0; overflow: hidden; }
    .nav-avatar img { width: 100%; height: 100%; object-fit: cover; border-radius: 50%; }
    .nav-username { font-size: 13px; color: rgba(255,255,255,0.7); }
    .nav-dropdown { display: none; position: absolute; top: calc(100% + 8px); right: 0; background: var(--panel); border: 1px solid var(--border); border-radius: 10px; min-width: 160px; padding: 6px; z-index: 200; }
    .nav-user.open .nav-dropdown { display: block; }
    .nav-dropdown-item { padding: 9px 12px; font-size: 13px; color: var(--muted); border-radius: 6px; cursor: pointer; transition: background 0.15s, color 0.15s; }
    .nav-dropdown-item:hover { background: rgba(255,255,255,0.05); color: var(--text); }
    .nav-dropdown-item.danger { color: var(--danger); }
    .nav-dropdown-item.danger:hover { background: rgba(248,113,113,0.08); }

    /* ── LAYOUT ── */
    .wrap { max-width: 1200px; margin: 0 auto; padding: 24px 20px; }
    .panel { background: var(--panel); border: 1px solid var(--line); border-radius: 16px; box-shadow: 0 10px 30px rgba(0,0,0,.2); overflow: hidden; }
    .hdr { display: flex; gap: 16px; align-items: center; justify-content: space-between; padding: 14px 16px; border-bottom: 1px solid var(--line); }
    .hdr h1 { font-size: 18px; margin: 0; font-weight: 700; }
    .muted { color: var(--muted); font-size: 12px; }

    /* ── TOOLBAR ── */
    .toolbar { display: flex; flex-wrap: wrap; align-items: center; gap: 10px 12px; padding: 12px 16px; border-bottom: 1px solid var(--line); }
    .pill {
      display: flex; align-items: center;
      padding: 5px 10px;
      border: 1px solid rgba(255,255,255,0.12);
      border-radius: 9999px;
      background: #0b1220;
      white-space: nowrap;
      font-size: 13px;
      color: var(--muted);
    }
    .pill select, .pill input[type="text"] {
      appearance: none;
      background: transparent;
      color: #fff;
      border: 0; outline: 0;
      height: 28px;
      padding: 0 6px;
      font-family: inherit;
      font-size: 13px;
    }
    .pill input[type="text"] { min-width: 150px; }
    .pill select { min-width: 110px; }
    .pill select option { background: #0b1220; }
    .pill select:focus, .pill input:focus { outline: 2px solid #3b82f6; outline-offset: 2px; border-radius: 4px; }
    #adminSearch { display: none; align-items: center; gap: 8px; }
    #adminSearch input { background: #0f172a; border: 1px solid #263042; color: #fff; border-radius: 8px; padding: 6px 10px; font-size: 12px; font-family: inherit; width: 200px; }
    .btn { background: #2563eb; border: 0; color: #fff; border-radius: 10px; padding: 0 14px; height: 34px; line-height: 34px; font-weight: 600; cursor: pointer; font-family: inherit; font-size: 13px; }
    .btn.alt { background: #334155; }

    /* ── BATCH SECTIONS ── */
    #dexRoot { padding: 14px 16px; display: flex; flex-direction: column; gap: 18px; }

    .section-wrap {
      border: 1px solid var(--border-blue);
      border-radius: 14px;
      overflow: hidden;
    }
    .section-hdr {
      display: flex; align-items: center; justify-content: space-between;
      padding: 9px 14px;
      background: rgba(55,138,221,0.07);
      border-bottom: 1px solid var(--border-blue);
    }
    .section-name { font-family: 'Maxime', serif; font-size: 13px; color: var(--accent2); letter-spacing: 0.07em; }
    .section-count { font-size: 12px; color: var(--muted); }
    .section-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(120px, 1fr));
      gap: 10px;
      padding: 12px;
    }

    /* ── CARD (collected) ── */
    .card {
      background: #0b1220;
      border: 1px solid var(--line);
      border-radius: 12px;
      overflow: hidden;
    }
    .card.collected {
      cursor: pointer;
      transition: transform 0.15s, box-shadow 0.15s;
    }
    .card.collected:hover { transform: translateY(-3px); box-shadow: 0 8px 24px rgba(0,0,0,0.4); }
    .thumb { aspect-ratio: 3/4; background: #060a12; display: block; width: 100%; object-fit: cover; }
    .meta { padding: 7px 9px; }
    .meta .name { font-size: 12px; font-weight: 700; line-height: 1.3; }
    .meta .sub  { font-size: 11px; color: var(--muted); margin-top: 2px; }

    /* ── COPY BADGE (only shown when count > 1) ── */
    .card-outer { position: relative; }
    .card-badge {
      position: absolute; top: -9px; right: -9px;
      background: #378ADD; color: #fff;
      font-size: 12px; font-weight: 700;
      min-width: 26px; height: 26px;
      border-radius: 50%;
      display: flex; align-items: center; justify-content: center;
      padding: 0 4px;
      box-shadow: 0 2px 8px rgba(0,0,0,0.55);
      border: 2px solid var(--bg);
      pointer-events: none; z-index: 3;
    }

    /* ── SILHOUETTE (uncollected) ── */
    .card-sil {
      aspect-ratio: 3/4;
      background: linear-gradient(145deg, #090f1c 0%, #0d1626 100%);
      display: flex; flex-direction: column;
      align-items: center; justify-content: center; gap: 5px;
    }
    .card-sil-icon { font-size: 26px; opacity: 0.09; user-select: none; }
    .card-sil-id   { font-size: 9px; color: rgba(255,255,255,0.16); font-family: monospace; letter-spacing: 0.04em; }
    .card.uncollected .name { color: rgba(255,255,255,0.32) !important; }
    .card.uncollected .sub  { color: rgba(255,255,255,0.15) !important; }

    /* ── STATUS BAR ── */
    .statusbar {
      padding: 10px 16px;
      border-top: 1px solid var(--line);
      font-size: 12px; color: var(--muted);
      display: flex; align-items: center; gap: 16px;
    }
    .status-loading { color: var(--accent2); }

    /* ── EMPTY / ERROR ── */
    .empty-state { padding: 48px; text-align: center; color: var(--muted); font-size: 14px; }

    /* ── LIGHTBOX ── */
    #lightbox {
      display: none; position: fixed; inset: 0;
      background: rgba(5,8,16,0.92);
      z-index: 600; align-items: center; justify-content: center;
      padding: 16px;
    }
    #lightbox.open { display: flex; }
    .lb-inner {
      position: relative; max-width: 340px; width: 100%;
      display: flex; flex-direction: column; align-items: center;
    }
    .lb-img {
      max-height: 78vh; max-width: 100%; width: auto;
      border-radius: 16px;
      box-shadow: 0 20px 60px rgba(0,0,0,0.65);
      object-fit: contain;
    }
    .lb-meta { margin-top: 14px; text-align: center; }
    .lb-name { font-size: 16px; font-weight: 700; }
    .lb-sub  { font-size: 13px; color: var(--muted); margin-top: 4px; }
    .lb-close {
      position: absolute; top: -14px; right: -14px;
      width: 34px; height: 34px; border-radius: 50%;
      background: #1f2937; border: 1px solid var(--border);
      color: var(--muted); font-size: 17px; cursor: pointer;
      display: flex; align-items: center; justify-content: center;
      z-index: 1; transition: background 0.15s, color 0.15s;
    }
    .lb-close:hover { color: #fff; background: #374151; }

    /* ── RESPONSIVE ── */
    @media (max-width: 640px) {
      nav { padding: 0 14px; }
      .nav-balance { display: none; }
      .nav-link { padding: 0 10px; font-size: 12px; }
      .section-grid { grid-template-columns: repeat(auto-fill, minmax(100px, 1fr)); gap: 8px; }
    }
  </style>
</head>

<script>
// ── CONFIG ──────────────────────────────────────────────────────────────────
const API_BASE = 'https://the-last-kick.keithcheung129.workers.dev/api';
const WORKER   = 'https://the-last-kick.keithcheung129.workers.dev';

// Friendly display names for known batches
const BATCH_NAMES = {
  'Base2526': 'Base 25/26',
  'PLCHAM26': 'Champions 25/26',
  'Base U':   'Utility',
};

// Explicit priority for batches that should always sort first
// Batches not listed here are sorted by their minimum card number
const BATCH_PRIORITY = { 'Base2526': 0 };

// ── AUTH STATE ───────────────────────────────────────────────────────────────
let sessionToken = localStorage.getItem('tlk_session') || '';
let currentUser  = null;

// ── DATA STATE ───────────────────────────────────────────────────────────────
let allCards = [];   // full card catalog from action:'cards'
let ownedMap = {};   // card_id → copy count

// ── HELPERS ──────────────────────────────────────────────────────────────────
const $ = id => document.getElementById(String(id).replace(/^#/, ''));
const val = (id, fb = '') => ($(''+id)?.value ?? fb);

// ── RARITY & SORT ────────────────────────────────────────────────────────────
const RARITY_RANK = { SSR:6, IR:5, SR:4, AR:3, R:2, N:1 };

// P-cards before EX-cards, then by number
function cardSortKey(card) {
  const id  = String(card.card_id || '');
  const pfx = (id.match(/^[A-Za-z]+/)?.[0] || '').toUpperCase();
  const num = parseInt(id.replace(/^[A-Za-z]+/, '')) || 0;
  const po  = pfx === 'P' ? '0' : pfx === 'EX' ? '1' : '9';
  return `${po}${String(num).padStart(7, '0')}`;
}

function sortCards(cards, mode) {
  return [...cards].sort((a, b) => {
    switch (mode) {
      case 'rarity':
        return (RARITY_RANK[b.rarity]||0) - (RARITY_RANK[a.rarity]||0)
            || cardSortKey(a).localeCompare(cardSortKey(b));
      case 'name':
        return (a.name||'').localeCompare(b.name||'');
      case 'club':
        return (a.club||'').localeCompare(b.club||'')
            || cardSortKey(a).localeCompare(cardSortKey(b));
      default: // card_num
        return cardSortKey(a).localeCompare(cardSortKey(b));
    }
  });
}

// ── BATCH ORDER ──────────────────────────────────────────────────────────────
function getBatchOrder() {
  // Compute minimum card sort key per batch
  const batchMin = {};
  for (const card of allCards) {
    const b = card.batch || 'Unknown';
    const k = cardSortKey(card);
    if (!batchMin[b] || k < batchMin[b]) batchMin[b] = k;
  }
  // Descending — newest batch (highest card IDs) first
  return Object.keys(batchMin).sort((a, b) =>
    batchMin[b].localeCompare(batchMin[a])
  );
}

// ── API ───────────────────────────────────────────────────────────────────────
async function callAPI(body) {
  const res = await fetch(API_BASE, {
    method: 'POST',
    headers: { 'Content-Type': 'application/json', 'X-Session-Token': sessionToken },
    body: JSON.stringify(body),
  });
  const text = await res.text();
  if (!res.ok) throw new Error(`API ${res.status}: ${text.slice(0, 300)}`);
  let parsed;
  try { parsed = JSON.parse(text); } catch { throw new Error('Bad JSON'); }
  return (parsed && 'ok' in parsed && 'data' in parsed) ? parsed.data : parsed;
}

// Fetch ALL owned cards — loops through pages (Apps Script caps at 96/page)
async function fetchAllOwned(userId) {
  const PAGE   = 96;
  const all    = [];
  let page     = 1;
  let firstRes = null;
  while (true) {
    const params = { action: 'collection', page, page_size: PAGE };
    if (userId) params.user_id = userId;
    const data = await callAPI(params);
    if (!firstRes) firstRes = data; // keep for balance info
    const items = data.items || [];
    all.push(...items);
    const total = Number(data.total ?? all.length);
    if (all.length >= total || items.length < PAGE) break;
    page++;
  }
  return { items: all, meta: firstRes };
}

// ── DATA LOADING ─────────────────────────────────────────────────────────────
async function loadAllData() {
  $('dexRoot').innerHTML = '<div class="empty-state">Loading…</div>';
  $('loadStatus').style.display = 'inline';
  $('countInfo').textContent = '—';

  try {
    const adminId = ($('userId')?.value || '').trim();

    // Fetch catalog and owned cards in parallel
    const [cardsData, ownedResult] = await Promise.all([
      callAPI({ action: 'cards' }),
      fetchAllOwned(adminId || undefined),
    ]);

    // Normalise catalog — cards API returns image_ref
    const raw = cardsData.items || cardsData.cards || (Array.isArray(cardsData) ? cardsData : []);
    allCards = raw.map(c => ({
      ...c,
      image_url: c.image_url || c.image_ref || '',
    }));

    // Build owned map: card_id → count
    ownedMap = {};
    for (const it of ownedResult.items) {
      const key = it.card_id;
      if (key) ownedMap[key] = (ownedMap[key] || 0) + 1;
    }

    updateNavBalance(ownedResult.meta);
    populateFilterDropdowns();
    renderAll();

  } catch (err) {
    console.error(err);
    $('dexRoot').innerHTML = `<div class="empty-state" style="color:#f87171">Failed to load: ${err.message}</div>`;
  } finally {
    $('loadStatus').style.display = 'none';
  }
}

// ── FILTER DROPDOWNS ─────────────────────────────────────────────────────────
function populateFilterDropdowns() {
  // Clubs (from catalog)
  const clubs = Array.from(new Set(allCards.map(c => (c.club||'').trim()).filter(Boolean))).sort();
  $('club').innerHTML = '<option value="ALL">Club: ALL</option>' +
    clubs.map(c => `<option>${c}</option>`).join('');

  // Batches in section order
  const batches = getBatchOrder();
  $('batch').innerHTML = '<option value="ALL">Batch: ALL</option>' +
    batches.map(b => `<option value="${b}">${BATCH_NAMES[b] || b}</option>`).join('');
}

// ── RENDER ────────────────────────────────────────────────────────────────────
function renderAll() {
  const root = $('dexRoot');
  root.innerHTML = '';

  const f = {
    rarity:      val('rarity',      'ALL'),
    position:    val('position',    'ALL'),
    club:        val('club',        'ALL'),
    batch:       val('batch',       'ALL'),
    ownedFilter: val('ownedFilter', 'ALL'),
    search:      val('search',      '').trim().toLowerCase(),
    sortMode:    val('sortBy',      'card_num'),
  };

  // Group catalog by batch
  const batchMap = {};
  for (const card of allCards) {
    const b = card.batch || 'Unknown';
    (batchMap[b] = batchMap[b] || []).push(card);
  }

  // Determine section order (fixed — not affected by filters)
  let batchOrder = getBatchOrder();
  if (f.batch !== 'ALL') batchOrder = batchOrder.filter(b => b === f.batch);

  let totalOwned = 0, totalVisible = 0;
  const frag = document.createDocumentFragment();

  for (const batchName of batchOrder) {
    const cards = batchMap[batchName] || [];

    // Apply filters within this section
    const filtered = cards.filter(card => {
      if (f.rarity   !== 'ALL' && card.rarity   !== f.rarity)   return false;
      if (f.position !== 'ALL' && card.position !== f.position) return false;
      if (f.club     !== 'ALL' && card.club     !== f.club)      return false;
      const owned = ownedMap[card.card_id] > 0;
      if (f.ownedFilter === 'OWNED'   && !owned) return false;
      if (f.ownedFilter === 'MISSING' &&  owned) return false;
      if (f.search) {
        const txt = `${card.name||''} ${card.card_id||''} ${card.club||''} ${card.position||''}`.toLowerCase();
        if (!txt.includes(f.search)) return false;
      }
      return true;
    });

    if (!filtered.length) continue; // hide empty sections

    const sorted    = sortCards(filtered, f.sortMode);
    const ownedHere = sorted.filter(c => ownedMap[c.card_id]).length;
    totalOwned  += ownedHere;
    totalVisible += sorted.length;

    // Section wrapper
    const section = document.createElement('div');
    section.className = 'section-wrap';

    // Section header
    const hdr = document.createElement('div');
    hdr.className = 'section-hdr';
    hdr.innerHTML =
      `<span class="section-name">${BATCH_NAMES[batchName] || batchName}</span>` +
      `<span class="section-count">${ownedHere} / ${sorted.length}</span>`;
    section.appendChild(hdr);

    // Card grid
    const grid = document.createElement('div');
    grid.className = 'section-grid';
    for (const card of sorted) grid.appendChild(buildCard(card));
    section.appendChild(grid);

    frag.appendChild(section);
  }

  if (!frag.children.length) {
    root.innerHTML = '<div class="empty-state">No cards match your filters.</div>';
  } else {
    root.appendChild(frag);
  }

  $('countInfo').textContent = `${totalOwned} / ${totalVisible} collected`;
}

// ── BUILD CARD ELEMENT ────────────────────────────────────────────────────────
function buildCard(card) {
  const count = ownedMap[card.card_id] || 0;
  const owned = count > 0;

  // Outer wrapper — position:relative but no overflow restriction,
  // so the count badge can hang over the corner of the card
  const outer = document.createElement('div');
  outer.className = 'card-outer';

  const div = document.createElement('div');
  div.className = 'card ' + (owned ? 'collected' : 'uncollected');

  if (owned) {
    // Card image
    const img = document.createElement('img');
    img.className = 'thumb';
    img.loading = 'lazy';
    img.src = card.image_url || '';
    img.alt = card.name || card.card_id || '';
    div.appendChild(img);

    div.addEventListener('click', () => openLightbox(card, count));
  } else {
    // Silhouette for uncollected
    const sil = document.createElement('div');
    sil.className = 'card-sil';
    sil.innerHTML =
      `<div class="card-sil-icon">◈</div>` +
      `<div class="card-sil-id">${card.card_id || ''}</div>`;
    div.appendChild(sil);
  }

  // Name + sub (always shown)
  const bits = [card.rarity, card.club, card.position].filter(Boolean);
  const meta = document.createElement('div');
  meta.className = 'meta';
  meta.innerHTML =
    `<div class="name">${card.name || card.card_id || '—'}</div>` +
    `<div class="sub">${bits.join(' • ')}</div>`;
  div.appendChild(meta);

  outer.appendChild(div);

  // Count badge — only when >1 copy; sits outside the card so it overhangs
  if (owned && count > 1) {
    const badge = document.createElement('div');
    badge.className = 'card-badge';
    badge.textContent = String(count);
    outer.appendChild(badge);
  }

  return outer;
}

// ── LIGHTBOX ─────────────────────────────────────────────────────────────────
function openLightbox(card, count) {
  const name = card.name || card.card_id || '—';
  const bits  = [card.rarity, card.club, card.position, card.batch].filter(Boolean);
  $('lbImg').src  = card.image_url || '';
  $('lbImg').alt  = name;
  $('lbName').textContent = name;
  $('lbSub').textContent  = bits.join(' • ') + (count > 1 ? `  •  ×${count} owned` : '');
  $('lightbox').classList.add('open');
}

document.addEventListener('keydown', e => {
  if (e.key === 'Escape') $('lightbox').classList.remove('open');
});

// ── NAV BALANCE ───────────────────────────────────────────────────────────────
function updateNavBalance(data) {
  const t   = data?.ticket_balance ?? data?.tickets  ?? data?.balances?.tickets ?? null;
  const tok = data?.token_balance  ?? data?.tokens   ?? data?.balances?.tokens  ?? null;
  if (t !== null) {
    $('navTickets').textContent = t;
    $('navTokens').textContent  = tok ?? '—';
    $('navBalance').style.display = 'flex';
  }
}

// ── AUTH ──────────────────────────────────────────────────────────────────────
function showLoginModal() {
  const m = $('loginModal');
  if (m) m.style.display = 'flex';
}

async function loadUserProfile() {
  try {
    const res  = await fetch(WORKER + '/auth/me', { headers: { 'X-Session-Token': sessionToken } });
    const json = await res.json();
    if (json.ok && json.user) currentUser = json.user;
  } catch {}
}

function updateNav() {
  if (!currentUser) return;
  const av = $('navAvatar');
  if (currentUser.avatar) {
    av.innerHTML = `<img src="${currentUser.avatar}" alt="">`;
  } else {
    av.textContent = (currentUser.global_name || currentUser.username || '?').slice(0, 2).toUpperCase();
  }
  $('navUsername').textContent = currentUser.global_name || currentUser.username;
  if (currentUser.is_admin) {
    $('adminLink').style.display = 'block';
    $('adminSearch').style.display = 'flex';
  }
  $('loginModal').style.display = 'none';
}

function toggleUserMenu() {
  if (!currentUser) { showLoginModal(); return; }
  $('navUser').classList.toggle('open');
}

document.addEventListener('click', e => {
  const nu = $('navUser');
  if (nu && !nu.contains(e.target)) nu.classList.remove('open');
});

async function doLogout() {
  try {
    await fetch(WORKER + '/auth/logout', { method: 'POST', headers: { 'X-Session-Token': sessionToken } });
  } catch {}
  sessionToken = '';
  currentUser  = null;
  localStorage.removeItem('tlk_session');
  window.location.reload();
}

// ── INIT ──────────────────────────────────────────────────────────────────────
(async function init() {
  // Capture OAuth redirect
  const urlParams  = new URLSearchParams(window.location.search);
  const urlSession = urlParams.get('session');
  const authStatus = urlParams.get('auth');
  if (urlSession) {
    sessionToken = urlSession;
    localStorage.setItem('tlk_session', sessionToken);
    const next = urlParams.get('u') ? `?u=${urlParams.get('u')}` : '';
    window.history.replaceState({}, '', window.location.pathname + next);
  } else if (authStatus) {
    window.history.replaceState({}, '', window.location.pathname);
  }

  // Admin ?u= param
  const uParam = urlParams.get('u');
  if (uParam) {
    const inp = $('userId');
    if (inp) inp.value = uParam;
    $('subtitle').textContent = `(viewing: ${uParam})`;
  }

  if (sessionToken) await loadUserProfile();

  if (!currentUser) {
    showLoginModal();
  } else {
    updateNav();
    loadAllData();
  }

  // Wire filters — all just re-render (data already loaded)
  const on = (id, evt, fn) => { const el = $(id); if (el) el.addEventListener(evt, fn); };
  on('search',      'input',  () => renderAll());
  on('rarity',      'change', () => renderAll());
  on('position',    'change', () => renderAll());
  on('club',        'change', () => renderAll());
  on('batch',       'change', () => renderAll());
  on('sortBy',      'change', () => renderAll());
  on('ownedFilter', 'change', () => renderAll());
  on('btnReset',    'click',  () => { location.href = location.pathname; });
  // Admin: re-fetch for a different user
  on('btnSearch',   'click',  () => {
    $('subtitle').textContent = $('userId').value ? `(viewing: ${$('userId').value})` : '';
    loadAllData();
  });
})();
</script>
